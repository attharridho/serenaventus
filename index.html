<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serena Ventus | Premium Fragrance Catalogue</title>
    <meta name="description"
        content="Fragrance catalogue for modern scent stories. Discover the premium collection of Serena Ventus.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="dynamic-bg" class="dynamic-bg"></div>
    <canvas id="particle-canvas"></canvas>
    <div id="custom-cursor"><div class="cursor-dot"></div></div>

    <nav>
        <a href="#" class="nav-brand" data-route="home" style="display: flex; align-items: center;">
            <img src="assets/logo.png" alt="Serena Ventus" style="height: 60px; width: auto;">
        </a>
        <div class="menu-toggle" id="mobile-menu-btn" style="cursor: pointer; z-index: 101; display: none;">
            <i data-lucide="menu" color="#fff"></i>
        </div>
        <div class="nav-links" id="nav-links-menu">
            <a href="#" data-route="catalogue">Catalogue</a>
            <a href="#" data-route="about">Our Story</a>
            <a href="#" data-route="contact">Contact</a>
        </div>
    </nav>

    <main id="app-root">
        <!-- Dynamic content will be injected here -->
    </main>

    <footer id="main-footer">
        <div class="container">
            <p class="text-sm text-uppercase text-muted">© 2026 Serena Ventus. All rights reserved.</p>
        </div>
    </footer>

    <!-- Icons via Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
